<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REPORT STACKER</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --primary-red: #e0245e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }

        h1 { font-size: 1.8rem; text-align: center; margin: 0; font-weight: 900; letter-spacing: 1px; color: #000; }

        /* リンク表示エリア */
        .display-card {
            background: #f8f9fa; border-radius: 12px; padding: 15px;
            min-height: 80px; max-height: 120px; overflow-y: auto;
            position: relative; border: 1px solid #eee;
        }
        .url-line { font-size: 0.8rem; color: #1a73e8; margin-bottom: 2px; }
        .copy-trigger { 
            position: absolute; top: 8px; right: 8px; background: #fff; 
            border: 1px solid #ddd; padding: 4px 12px; border-radius: 6px; 
            font-size: 0.75rem; cursor: pointer; color: #5f6368; font-weight: bold;
        }

        /* 水晶玉ボタン（真上からの視点） */
        .button-section { display: flex; justify-content: center; padding: 10px 0; }
        .btn-base-flat {
            width: 180px; height: 180px;
            background: radial-gradient(circle, #444 0%, #111 80%, #000 100%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative;
        }
        #mainBtn {
            width: 145px; height: 145px; border: none; border-radius: 50%;
            background: radial-gradient(circle at 50% 30%, #ffc0d4 0%, #ff0044 50%, #5e0018 100%);
            cursor: pointer; outline: none; position: relative;
            box-shadow: inset 0 12px 15px rgba(255,255,255,0.7), inset 0 -10px 20px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent; transition: transform 0.05s;
        }
        #mainBtn::after {
            content: ''; position: absolute; top: 12%; left: 25%; width: 50%; height: 22%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
            filter: blur(4px); border-radius: 50%;
        }
        #mainBtn:active { transform: scale(0.94); }

        /* 【最重要】事務所への通報ボタン */
        .office-report-btn { 
            width: 100%; padding: 25px; background: #000; color: #fff; border: none; 
            border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1.4rem; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); text-decoration: none; text-align: center;
            display: block; box-sizing: border-box;
        }
        .office-report-btn:active { transform: scale(0.98); background: #333; }

        /* Googleフォーム埋め込み */
        .form-section { width: 100%; margin-top: 20px; text-align: center; }
        .form-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; color: #666; }
        .form-embed {
            width: 100%; border-radius: 15px; overflow: hidden;
            border: 2px solid #f0f0f0; background: #fff;
        }

        .footer { padding: 30px 0; color: #ccc; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>REPORT STACKER</h1>

    <div class="display-card">
        <button class="copy-trigger" id="copyBtn">Copy</button>
        <div id="urlContainer"></div>
    </div>

    <div class="button-section">
        <div class="btn-base-flat"><button id="mainBtn"></button></div>
    </div>

    <a href="https://starto.jp/s/p/form/question?cd=violation" target="_blank" class="office-report-btn">
        事務所へ通報する
    </a>

    <div class="form-section">
        <div class="form-title">管理者にユーザーを報告する ↓</div>
        <div class="form-embed">
            <iframe src="https://docs.google.com/forms/d/e/【あなたのフォームID】/viewform?embedded=true" width="100%" height="600" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
        </div>
    </div>

    <div class="footer">REPORT STACKER Tool</div>
</div>

<script>
    const masterUrls = ["https://example.com/url1", "https://example.com/url2"]; 
    let pool = [...masterUrls];
    let stacked = [];

    const mainBtn = document.getElementById('mainBtn');
    const urlContainer = document.getElementById('urlContainer');
    const copyBtn = document.getElementById('copyBtn');

    // リンクを貯める
    mainBtn.addEventListener('click', () => {
        if (pool.length === 0) return;
        if(navigator.vibrate) navigator.vibrate(15);
        const idx = Math.floor(Math.random() * pool.length);
        const url = pool.splice(idx, 1)[0];
        stacked.push(url);
        const div = document.createElement('div');
        div.className = 'url-line'; div.textContent = url;
        urlContainer.prepend(div);
    });

    // コピー
    copyBtn.addEventListener('click', () => {
        if (stacked.length === 0) return;
        if(navigator.vibrate) navigator.vibrate(40);
        navigator.clipboard.writeText(stacked.join('\n')).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = "Done!";
            setTimeout(() => copyBtn.textContent = originalText, 1500);
        });
    });
</script>

</body>
</html>
