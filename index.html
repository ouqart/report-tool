<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>URL Stack Master</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }

        /* リンク表示エリア（Gemini風） */
        .display-card {
            background: #f8f9fa; border-radius: 12px; padding: 15px;
            min-height: 80px; max-height: 120px; overflow-y: auto;
            position: relative; border: 1px solid #eee;
        }
        .url-line { font-size: 0.8rem; color: #1a73e8; margin-bottom: 2px; }
        .copy-trigger { 
            position: absolute; top: 8px; right: 8px; background: #fff; 
            border: 1px solid #ddd; padding: 4px 10px; border-radius: 6px; 
            font-size: 0.7rem; cursor: pointer; color: #5f6368;
        }

        /* 真上から見た水晶玉ボタン（超光沢仕様） */
        .button-section { display: flex; justify-content: center; padding: 20px 0; }
        .btn-base-flat {
            width: 170px; height: 170px;
            background: radial-gradient(circle, #444 0%, #111 80%, #000 100%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); position: relative;
        }
        #mainBtn {
            width: 135px; height: 135px; border: none; border-radius: 50%;
            /* 水晶玉のグラデーション：中心をずらして立体感を出す */
            background: radial-gradient(circle at 50% 30%, #ffc0d4 0%, #ff0044 50%, #5e0018 100%);
            cursor: pointer; outline: none; position: relative;
            box-shadow: 
                inset 0 12px 15px rgba(255,255,255,0.7), 
                inset 0 -10px 20px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent; transition: transform 0.05s;
        }
        /* 真上からの強いテカリ */
        #mainBtn::after {
            content: ''; position: absolute; top: 12%; left: 25%; width: 50%; height: 22%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
            filter: blur(4px); border-radius: 50%;
        }
        #mainBtn:active { transform: scale(0.94); opacity: 0.9; }

        /* 入力・設定カード */
        .settings-card { background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .checkbox-group { display: flex; gap: 5px; justify-content: space-between; margin-bottom: 15px; }
        .checkbox-group label { font-size: 0.85rem; display: flex; align-items: center; gap: 5px; font-weight: bold; }
        
        .input-wrapper { position: relative; margin-bottom: 12px; }
        .input-wrapper span { position: absolute; left: 12px; top: 11px; font-weight: bold; color: #1a1a1a; }
        .input-wrapper input {
            width: 100%; padding: 12px 12px 12px 30px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem;
        }
        textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; height: 60px; resize: none; margin-bottom: 15px; font-family: sans-serif;
        }

        .send-btn { 
            width: 100%; padding: 16px; background: #1a1a1a; color: white; border: none; 
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .send-btn:active { transform: scale(0.98); background: #333; }

        /* 下部リンク */
        .footer-links { text-align: center; padding: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .report-link { color: #bbb; font-size: 0.75rem; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="display-card">
        <button class="copy-trigger" id="copyBtn">Copy</button>
        <div id="urlContainer"></div>
    </div>

    <div class="button-section">
        <div class="btn-base-flat">
            <button id="mainBtn"></button>
        </div>
    </div>

    <div class="settings-card">
        <div class="checkbox-group">
            <label><input type="checkbox" value="X" class="app-check"> X</label>
            <label><input type="checkbox" value="Instagram" class="app-check"> Instagram</label>
            <label><input type="checkbox" value="TikTok" class="app-check"> TikTok</label>
        </div>
        <div class="input-wrapper">
            <span>@</span>
            <input type="text" id="usernameInput" placeholder="ユーザーネーム">
        </div>
        <textarea id="opinionInput" placeholder="ツールへのご意見（任意）"></textarea>
        <button class="send-btn" id="sendBtn">Googleフォームへ送る</button>
    </div>

    <div class="footer-links">
        <a href="https://starto.jp/s/p/form/question?cd=violation" target="_blank" class="report-link">事務所へ通報する</a>
    </div>
</div>

<script>
    // --- 【管理用】認識済みのURLリスト ---
    // 新しく見つけたらここに足して保存してください
    const masterUrls = [
        "https://example.com/id001",
        "https://example.com/id002",
        "https://example.com/id003"
    ];

    let pool = [...masterUrls];
    let stacked = [];

    const mainBtn = document.getElementById('mainBtn');
    const urlContainer = document.getElementById('urlContainer');
    const copyBtn = document.getElementById('copyBtn');

    // 水晶玉を押してリンクを貯める
    mainBtn.addEventListener('click', () => {
        if (pool.length === 0) return alert("リストのURLをすべて貯めました");
        if(navigator.vibrate) navigator.vibrate(15);

        const idx = Math.floor(Math.random() * pool.length);
        const url = pool.splice(idx, 1)[0];
        stacked.push(url);

        const div = document.createElement('div');
        div.className = 'url-line';
        div.textContent = url;
        urlContainer.prepend(div);
    });

    // Copyボタン（振動付き）
    copyBtn.addEventListener('click', () => {
        if (stacked.length === 0) return;
        if(navigator.vibrate) navigator.vibrate(40);
        
        const selectedApps = Array.from(document.querySelectorAll('.app-check:checked')).map(c => c.value);
        const user = document.getElementById('usernameInput').value;
        const appPrefix = selectedApps.length > 0 ? `【${selectedApps.join('/')}】\n` : "";
        const userPrefix = user ? `@${user}\n\n` : "";
        const finalContent = appPrefix + userPrefix + stacked.join('\n');

        navigator.clipboard.writeText(finalContent).then(() => {
            copyBtn.textContent = "Done!";
            setTimeout(() => copyBtn.textContent = "Copy", 1500);
        });
    });

    // 送信ボタン（Googleフォームへ飛ばす）
    document.getElementById('sendBtn').addEventListener('click', () => {
        // あなたのGoogleフォームの編集用URLなど、管理画面へ飛ばすとチェックしやすいです
        // もしくは回答用フォームのURLを入れてください
        const formUrl = "https://docs.google.com/forms/d/e/あなたのフォームID/viewform"; 
        window.open(formUrl, '_blank');
    });
</script>

</body>
</html>
