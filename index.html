<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Generator</title>
    <style>
        :root {
            --primary: #e0245e; /* つやつやボタンの赤 */
            --bg: #ffffff;      /* 背景は白でスッキリ */
            --input-bg: #f5f8fa;
        }

        body {
            background: var(--bg);
            color: #14171a;
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 { font-size: 1.2rem; text-align: center; margin: 10px 0; }

        /* 入力ボックス：リンク先のサイトに近いデザイン */
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            background: var(--input-bg);
            font-size: 1rem;
            box-sizing: border-box;
            resize: none;
        }
        textarea:focus { border-color: var(--primary); outline: none; background: #fff; }

        /* セットボタン */
        .action-btn {
            width: 100%;
            padding: 15px;
            background: #14171a;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        /* カウンター表示 */
        .counter {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary);
        }
        #stackCount { font-size: 2.5rem; display: block; }

        /* 赤いつやつやボタン */
        .main-btn-outer {
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }
        #addBtn {
            width: 140px;
            height: 140px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff2a6f, #ca2055);
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: 0 10px 20px rgba(224, 36, 94, 0.3), inset 8px 8px 15px #ff3b81;
            position: relative;
            cursor: pointer;
            touch-action: manipulation;
        }
        #addBtn::after {
            content: ''; position: absolute; top: 10%; left: 15%; width: 70%; height: 30%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0));
            border-radius: 50%;
        }
        #addBtn:active { transform: scale(0.95); }
        #addBtn:disabled { background: #ccd6dd; box-shadow: none; }

        /* コピーボタン */
        .copy-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(224, 36, 94, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>URLスタックメーカー</h1>

    <textarea id="urlInput" placeholder="ここにURLを1行ずつ貼り付けてください"></textarea>
    
    <button class="action-btn" onclick="setupList()">URLをセットする</button>

    <div class="counter">
        <span id="stackCount">0</span>
        <small>件スタック中 / 最大50件</small>
    </div>

    <div class="main-btn-outer">
        <button id="addBtn">貯める</button>
    </div>

    <button id="finalCopyBtn" class="copy-btn" onclick="copyResult()">一括コピーする</button>
</div>

<script>
    let masterList = [];
    let selectedStack = [];
    let timer = null;

    const btn = document.getElementById('addBtn');
    const countDisplay = document.getElementById('stackCount');

    // 1. 入力されたURLを読み込む
    function setupList() {
        const text = document.getElementById('urlInput').value;
        masterList = text.split('\n').map(line => line.trim()).filter(line => line !== "");
        
        if (masterList.length === 0) {
            alert("URLを入力してください！");
            return;
        }
        
        selectedStack = [];
        countDisplay.textContent = "0";
        btn.disabled = false;
        alert(masterList.length + "件のURLをセットしました。");
    }

    // 2. スタックに追加する（一定リズム連射）
    function addLink() {
        if (masterList.length === 0) {
            alert("先に上のボタンでURLをセットしてください");
            stop();
            return;
        }
        if (selectedStack.length >= 50) {
            stop();
            btn.disabled = true;
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            return;
        }

        const randomUrl = masterList[Math.floor(Math.random() * masterList.length)];
        selectedStack.push(randomUrl);
        countDisplay.textContent = selectedStack.length;

        if(navigator.vibrate) navigator.vibrate(15);
    }

    function start(e) {
        e.preventDefault();
        if(btn.disabled) return;
        addLink();
        timer = setInterval(addLink, 100);
    }

    function stop() { clearInterval(timer); timer = null; }

    function copyResult() {
        if (selectedStack.length === 0) return alert("まだ貯まっていません");
        navigator.clipboard.writeText(selectedStack.join('\n'));
        alert("コピー完了！");
    }

    btn.addEventListener('touchstart', start);
    btn.addEventListener('touchend', stop);
    btn.addEventListener('touchcancel', stop);
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', stop);
</script>

</body>
</html>
