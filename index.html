<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Report Stack</title>
    <style>
        :root {
            --bg: #10171e;
            --text: #ffffff;
            --accent-red: #e0245e;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .status {
            font-size: 1.1rem;
            margin: 20px 0 40px 0;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #stackCount {
            font-size: 2.5rem;
            color: var(--accent-red);
            font-weight: bold;
            margin: 0 10px;
        }

        /* 赤い丸でつやつやのボタン */
        #addBtn {
            width: 160px;
            height: 160px;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            background: linear-gradient(145deg, #ff2a6f, #ca2055);
            box-shadow: 
                15px 15px 40px #0a0e13,
                -5px -5px 20px #1a2530,
                inset 10px 10px 15px #ff3b81,
                inset -10px -10px 15px #a81b47;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            transition: transform 0.05s;
        }

        #addBtn::after {
            content: '';
            position: absolute;
            top: 8%;
            left: 15%;
            width: 70%;
            height: 35%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.45), rgba(255,255,255,0));
            border-radius: 50%;
        }

        #addBtn:active {
            transform: scale(0.92) translateY(4px);
            box-shadow: inset 12px 12px 20px #a81b47, inset -12px -12px 20px #ff3b81;
        }

        #addBtn:disabled { background: #536471; box-shadow: none; opacity: 0.5; }

        .copy-btn {
            width: 100%;
            max-width: 300px;
            padding: 18px;
            background: none;
            color: var(--accent-red);
            border: 2px solid var(--accent-red);
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 50px;
        }

        .form-section { margin-top: auto; padding: 30px; width: 100%; border-top: 1px solid #38444d; }
        .form-link { color: var(--accent-red); font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <h1>通報支援スタック</h1>
    <div class="status">選択中: <span id="stackCount">0</span> / 50</div>
    
    <button id="addBtn">貯める</button>
    <button id="finalCopyBtn" class="copy-btn">一括コピー</button>

    <div class="form-section">
        <p>通報候補を教える</p>
        <a href="https://forms.google.com/..." class="form-link">報告フォーム ↗</a>
    </div>

    <script>
        const masterList = [
            "https://x.com/sample1", "https://x.com/sample2", "https://x.com/sample3"
        ];

        let selectedStack = [];
        let timer = null;
        
        const btn = document.getElementById('addBtn');
        const countDisplay = document.getElementById('stackCount');

        function addLink() {
            if (selectedStack.length >= 50) {
                stop();
                btn.disabled = true;
                btn.textContent = "満タン";
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                return;
            }
            const randomUrl = masterList[Math.floor(Math.random() * masterList.length)];
            selectedStack.push(randomUrl);
            countDisplay.textContent = selectedStack.length;
            if(navigator.vibrate) navigator.vibrate(15); 
        }

        function start(e) {
            e.preventDefault();
            if(btn.disabled) return;
            addLink(); 
            timer = setInterval(addLink, 100); // 0.1秒間隔で連射
        }

        function stop() { clearInterval(timer); timer = null; }

        btn.addEventListener('touchstart', start);
        btn.addEventListener('touchend', stop);
        btn.addEventListener('touchcancel', stop);
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', stop);

        document.getElementById('finalCopyBtn').addEventListener('click', async () => {
            if (selectedStack.length === 0) return alert("貯めてください");
            await navigator.clipboard.writeText(selectedStack.join('\n'));
            alert(selectedStack.length + "件コピー完了！");
            selectedStack = [];
            countDisplay.textContent = "0";
            btn.disabled = false;
            btn.textContent = "貯める";
        });
    </script>
</body>
</html>
