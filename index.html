<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REPORT SUPPORT</title>
    <style>
        :root { 
            --bg: #fff5f5;
            --text: #4a0e0e;
            --card-bg: #ffe3e3;
            --accent-red: #ff4d4d;
            --border-red: #ffccd5;
            --white: #ffffff;
        }
        
        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            touch-action: manipulation; -webkit-user-select: none; overflow-x: hidden;
        }
        
        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .title-area { height: 60px; display: flex; align-items: center; justify-content: center; }
        h1 { font-size: 1.8rem; text-align: center; margin: 0; font-weight: 900; letter-spacing: 1px; color: var(--accent-red); }

        .button-section { height: 220px; display: flex; justify-content: center; align-items: center; }
        
        .btn-base-flat {
            width: 170px; height: 170px;
            background: var(--white);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(255, 77, 77, 0.15);
            border: 1px solid var(--border-red);
        }
        
        #mainBtn {
            width: 130px; height: 130px; border: none; border-radius: 50%;
            background: radial-gradient(circle at 50% 35%, #ffb3b3 0%, #ff0044 60%, #800022 100%);
            cursor: pointer; outline: none; position: relative;
            box-shadow: 
                0 10px 20px rgba(130, 0, 0, 0.3),
                inset 0 6px 10px rgba(255, 255, 255, 0.6),
                inset 0 -6px 10px rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent; 
            transition: all 0.1s ease-out;
        }

        #mainBtn::after {
            content: ''; position: absolute; top: 8%; left: 22%; width: 56%; height: 28%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
            filter: blur(1.5px); border-radius: 50%;
        }

        .is-pressed { 
            transform: scale(0.95) translateY(2px) !important;
            box-shadow: 
                0 4px 10px rgba(130, 0, 0, 0.2),
                inset 0 10px 15px rgba(0, 0, 0, 0.4),
                inset 0 -4px 10px rgba(255, 255, 255, 0.3) !important;
        }

        .display-card {
            background: var(--card-bg); border-radius: 12px; padding: 15px;
            height: 100px; overflow-y: auto;
            position: relative; border: 1px solid var(--border-red); margin-bottom: 20px;
        }
        
        .url-line { font-size: 0.8rem; color: #d63031; margin-bottom: 4px; word-break: break-all; font-weight: 500;}
        
        .controls { 
            position: sticky; top: -5px; float: right; display: flex; gap: 5px; z-index: 100;
            background: rgba(255, 227, 227, 0.9); padding: 2px; border-radius: 4px;
        }
        
        .control-btn { 
            background: var(--white); border: 1px solid var(--border-red); padding: 4px 10px; border-radius: 6px; 
            font-size: 0.75rem; cursor: pointer; color: var(--accent-red); font-weight: bold;
        }

        .office-report-btn { 
            width: 100%; padding: 18px; background: var(--accent-red); color: var(--white); border: none; 
            border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1.2rem; 
            text-decoration: none; text-align: center; display: block; box-sizing: border-box;
            margin-bottom: 20px; box-shadow: 0 6px 15px rgba(255, 77, 77, 0.2);
        }

        .accordion-item { border: 1px solid var(--border-red); border-radius: 12px; overflow: hidden; background: var(--white); margin-bottom: 10px; }
        .accordion-header { 
            width: 100%; padding: 15px; background: var(--white); border: none; 
            display: flex; justify-content: space-between; align-items: center; 
            font-weight: bold; cursor: pointer; font-size: 0.95rem; color: var(--text);
        }
        
        .arrow { width: 8px; height: 8px; border-right: 2px solid var(--accent-red); border-bottom: 2px solid var(--accent-red); transform: rotate(45deg); transition: transform 0.3s; margin-right: 5px; }
        .accordion-item.active .arrow { transform: rotate(-135deg); }
        .accordion-content { display: none; border-top: 1px solid var(--border-red); background: var(--white); }
        .accordion-item.active .accordion-content { display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div class="title-area"><h1>REPORT SUPPORT</h1></div>

    <div class="button-section">
        <div class="btn-base-flat"><button id="mainBtn"></button></div>
    </div>

    <div class="display-card">
        <div class="controls">
            <button class="control-btn" id="clearBtn">Clear</button>
            <button class="control-btn" id="copyBtn">Copy</button>
        </div>
        <div id="statusMsg" style="font-size: 0.85rem; color: var(--text); opacity: 0.7; margin-bottom: 5px;"></div>
        <div id="urlContainer"></div>
    </div>

    <a href="https://starto.jp/s/p/form/question?cd=violation" target="_blank" class="office-report-btn">通報フォーム</a>

    <div class="form-area">
        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">⚠️ 情報提供はこちら <span class="arrow"></span></button>
            <div class="accordion-content"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdgeB3B-xQJ5tw1xrZHzlxQKDqoX7CQF4BqMpkotaX0UPfUrw/viewform?embedded=true" width="100%" height="450" frameborder="0"></iframe></div>
        </div>
        <div class="accordion-item">
            <button class="accordion-header" onclick="toggleAccordion(this)">✉️ ご意見・ご感想 <span class="arrow"></span></button>
            <div class="accordion-content"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe3dHNLs7cyLtGcsCyR7hPRHLwSiNWl0x7YfCsQdZI6LQgaXA/viewform?embedded=true" width="100%" height="450" frameborder="0"></iframe></div>
        </div>
    </div>
</div>

<script>
    const apiURL = 'https://script.google.com/macros/s/AKfycbwNMIqyjChPN5ckansj4zEcv-fEF9G6jnIOrdopZTCLOMMSRH5pZTEpS4U7-7-IJG2s/exec';
    let pool = []; 
    let stacked = [];

    const mainBtn = document.getElementById('mainBtn');
    const urlContainer = document.getElementById('urlContainer');
    const statusMsg = document.getElementById('statusMsg');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    async function loadUrls() {
        try {
            statusMsg.textContent = "読み込み中...";
            const res = await fetch(`${apiURL}?action=getReports`);
            pool = await res.json();
            statusMsg.textContent = pool.length > 0 ? "ボタンを押してリンクを取得" : "新しいリンクはありません。";
        } catch (e) { statusMsg.textContent = "読み込みエラー"; }
    }

    function pressStart() {
        mainBtn.classList.add('is-pressed');
        if(navigator.vibrate) navigator.vibrate(12);
        if (pool.length > 0) {
            const idx = Math.floor(Math.random() * pool.length);
            const url = pool.splice(idx, 1)[0];
            stacked.push(url);
            statusMsg.textContent = ""; 
            const div = document.createElement('div');
            div.className = 'url-line'; 
            div.textContent = url;
            urlContainer.prepend(div);
        } else { statusMsg.textContent = "新しいリンクはありません。"; }
    }

    function pressEnd() { mainBtn.classList.remove('is-pressed'); }

    clearBtn.addEventListener('click', () => {
        stacked = []; 
        urlContainer.innerHTML = ""; 
        statusMsg.textContent = pool.length === 0 ? "新しいリンクはありません。" : "ボタンを押してリンクを取得";
        clearBtn.textContent = "Reset!";
        setTimeout(() => clearBtn.textContent = "Clear", 800);
    });

    mainBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pressStart(); });
    mainBtn.addEventListener('touchend', pressEnd);
    mainBtn.addEventListener('mousedown', pressStart);
    mainBtn.addEventListener('mouseup', pressEnd);
    mainBtn.addEventListener('mouseleave', pressEnd);

    copyBtn.addEventListener('click', () => {
        if (stacked.length === 0) return;
        navigator.clipboard.writeText(stacked.join('\n')).then(() => {
            copyBtn.textContent = "Done!";
            setTimeout(() => copyBtn.textContent = "Copy", 1200);
        });
    });

    function toggleAccordion(element) { element.parentElement.classList.toggle('active'); }
    loadUrls();
</script>
</body>
</html>
