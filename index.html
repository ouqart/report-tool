<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Report Link Generator</title>
    <style>
        :root {
            --primary: #e0245e;
            --bg: #f5f8fa;
            --card: #ffffff;
            --text: #14171a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; color: var(--primary); }

        /* 入力エリア */
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 0.9rem;
            box-sizing: border-box;
            resize: none;
            margin-bottom: 10px;
        }
        textarea:focus { border-color: var(--primary); outline: none; }

        .setup-btn {
            width: 100%;
            padding: 12px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* カウンター表示 */
        .counter-box {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        #stackCount { font-size: 2.5rem; font-weight: bold; color: var(--primary); }

        /* つやつやボタン */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        #addBtn {
            width: 140px;
            height: 140px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff2a6f, #ca2055);
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 10px 10px 30px #d1d9e6, -10px -10px 30px #ffffff, inset 8px 8px 15px #ff3b81;
            position: relative;
            cursor: pointer;
            touch-action: manipulation;
        }
        #addBtn::after {
            content: ''; position: absolute; top: 10%; left: 15%; width: 70%; height: 35%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0));
            border-radius: 50%;
        }
        #addBtn:active { transform: scale(0.95); box-shadow: inset 5px 5px 10px #a81b47; }
        #addBtn:disabled { background: #ccd6dd; box-shadow: none; }

        /* コピーボタン */
        .copy-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(224, 36, 94, 0.3);
        }

        .footer-link {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #657786;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Report Link Generator</h1>

    <p style="font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">① 通報対象のURLを入力（1行に1つ）</p>
    <textarea id="urlInput" placeholder="https://x.com/..."></textarea>
    <button class="setup-btn" onclick="setupList()">リストをセットする</button>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="counter-box">
        <span id="stackCount">0</span> <small>/ 50 件</small>
    </div>

    <div class="btn-wrapper">
        <button id="addBtn">貯める</button>
    </div>

    <button id="finalCopyBtn" class="copy-btn" onclick="copyResult()">結果をコピーする</button>
</div>

<div class="footer-link">
    <a href="https://forms.google.com/" style="color: #657786; text-decoration: none;">報告フォームはこちら ↗</a>
</div>

<script>
    let masterList = [];
    let selectedStack = [];
    let timer = null;

    const btn = document.getElementById('addBtn');
    const countDisplay = document.getElementById('stackCount');

    // リストをセットする
    function setupList() {
        const input = document.getElementById('urlInput').value;
        masterList = input.split('\n').filter(url => url.trim() !== "");
        if(masterList.length === 0) {
            alert("URLを1つ以上入力してください");
        } else {
            alert(masterList.length + "件のURLを読み込みました！下のボタンで貯めてください。");
            resetStack();
        }
    }

    function addLink() {
        if (masterList.length === 0) {
            alert("先に上の入力欄にURLをセットしてください");
            stop();
            return;
        }
        if (selectedStack.length >= 50) {
            stop();
            btn.disabled = true;
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            return;
        }
        const randomUrl = masterList[Math.floor(Math.random() * masterList.length)];
        selectedStack.push(randomUrl);
        countDisplay.textContent = selectedStack.length;
        if(navigator.vibrate) navigator.vibrate(15);
    }

    function start(e) {
        e.preventDefault();
        if(btn.disabled) return;
        addLink();
        timer = setInterval(addLink, 100);
    }

    function stop() { clearInterval(timer); timer = null; }

    function resetStack() {
        selectedStack = [];
        countDisplay.textContent = "0";
        btn.disabled = false;
    }

    function copyResult() {
        if (selectedStack.length === 0) return alert("まずは貯めてください");
        const text = selectedStack.join('\n');
        navigator.clipboard.writeText(text);
        alert(selectedStack.length + "件コピーしました！");
    }

    btn.addEventListener('touchstart', start);
    btn.addEventListener('touchend', stop);
    btn.addEventListener('touchcancel', stop);
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', stop);
</script>

</body>
</html>
